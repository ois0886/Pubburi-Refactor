server.port=${PUBBURI_SERVER_PORT:9987}

spring.application.name=pubburi-server
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${PUBBURI_DB_URL}
spring.datasource.username=${PUBBURI_DB_USER}
spring.datasource.password=${PUBBURI_DB_PASSWORD}

mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.pubburi.pub.model.dto
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.pubburi=${PUBBURI_LOG_LEVEL:INFO}
springdoc.swagger-ui.path=/docs
